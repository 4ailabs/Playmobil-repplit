<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <title>Los Cuatro Caminos de Vida - Playworld Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Warm, earthy palette for therapeutic context */
      --background: 36 25% 97%; /* warm ivory */
      --foreground: 24 10% 15%; /* deep warm charcoal */
      --primary: 24 60% 40%; /* warm terracotta */
      --primary-foreground: 36 30% 96%;
      --secondary: 36 20% 92%; /* warm sand */
      --secondary-foreground: 24 10% 20%;
      --muted: 36 15% 94%;
      --muted-foreground: 24 8% 55%;
      --accent: 36 25% 90%;
      --accent-foreground: 24 10% 15%;
      --destructive: 0 65% 50%;
      --destructive-foreground: 36 30% 96%;
      --border: 30 18% 86%;
      --input: 30 18% 86%;
      --ring: 24 60% 40%;
      --radius: 0.625rem;

      /* Life path accent colors */
      --path-north: 210 65% 45%; /* deep ocean blue */
      --path-south: 0 60% 48%; /* warm crimson */
      --path-east: 45 75% 50%; /* golden amber */
      --path-west: 160 40% 38%; /* sage green */

      /* Typography */
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', system-ui, sans-serif;

      /* Studio chrome (dark panels) */
      --chrome-bg: 24 12% 12%;
      --chrome-surface: 24 10% 16%;
      --chrome-hover: 24 10% 20%;
      --chrome-border: 24 8% 22%;
      --chrome-text: 36 20% 85%;
      --chrome-text-muted: 24 10% 55%;
      --chrome-accent: 36 65% 55%;
      --chrome-accent-hover: 36 65% 62%;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
